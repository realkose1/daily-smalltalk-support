name: Daily push

on:
  # No schedule: GitHub cron fired 3+ hours late every day (observed 12:21,
  # 12:21, 12:48 KST for a 09:05 slot). The daily 09:00 send now runs on
  # Supabase pg_cron (see backend/schema.sql, send_daily_push()). This
  # workflow remains as a manual backup sender only.
  workflow_dispatch: {} # manual "Run workflow" for testing/backup

permissions:
  contents: read

concurrency:
  group: daily-push
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # today.json lives at the repo root and is committed by daily.yml.
      - name: Send push
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/send-push.mjs
