name: Daily topic

on:
  schedule:
    # 21:00 UTC == 06:00 KST next day. Generate at 6am so the new topics are
    # deployed well before the 9am notification (avoids the app briefly showing
    # yesterday's cached content when opened right at 9:00).
    - cron: '0 21 * * *'
  workflow_dispatch: {}   # allow manual "Run workflow" for testing

permissions:
  contents: write

concurrency:
  group: daily-topic
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Generate today's topics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run generate

      - name: Commit if changed
        run: |
          git config user.name "daily-smalltalk-bot"
          git config user.email "bot@users.noreply.github.com"
          git add today.json content/archive
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "content: $(date -u +%Y-%m-%d) topics"
            git pull --rebase --autostash origin main || true
            git push
          fi
